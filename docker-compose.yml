services:
  db:
    image: postgres:15-alpine
    container_name: taskmanager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-taskmanager_db}
      POSTGRES_USER:     ${DB_USER:-taskmanager_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskmanager_user} -d ${DB_NAME:-taskmanager_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskmanager_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      target: production
    container_name: taskmanager_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST:   db
      REDIS_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_volume:/app/staticfiles

  nginx:
    image: nginx:alpine
    container_name: taskmanager_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - static_volume:/app/staticfiles
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  static_volume:
